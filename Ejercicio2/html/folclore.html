<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Folclore Salvadoreño - Rockola</title>
    <link rel="stylesheet" href="../css/styles.css">
    <!-- Bootstrap grid -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>

    <section class="video-section">
        <video autoplay loop muted id="videoFondo">
            <source src="../video/lv_0_20260225005426.mp4" type="video/mp4">
        </video>

        <div class="degradado"></div>
    </section>

    <section class="contenido">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <!-- Imagen del género (izquierda) -->
                     <img class="imgfix" src="../img/folklor.jpeg" alt="Folclore Salvadoreño" class="w-100">
                    <!-- Audio oculto para reproducir al pasar el mouse -->
                    <audio id="audioGenero" src="../audio/El torito pinto - Folklore Salvadoreño(MP3_160K).mp3.mpeg"></audio>
                </div>
                <div class="col-md-6">
                    <div class="container">
                        <div class="row position-relative text-center rounded p-3"></div>
                            <h2 class="text-dark">Folclore Salvadoreño</h2>
                            <p class="text-dark">Lista de canciones del género.</p>
                            <div id="songContainer" class="w-100 text-start py-2">
                                <!-- canciones.js insertará aquí etiquetas/elementos de canción -->
                            </div>
                            <button id="btnAgregarSong" class="btn btn-success">+ Agregar Canción</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <br>
       <div>
          <a class="link" href="index.html">Volver al menú</a>
        </div>
    </section>

    <script src="../js/canciones.js"></script>
    <script src="../js/imagen-audio.js"></script>
</body>

</html>
