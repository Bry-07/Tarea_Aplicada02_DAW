<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Orden Lexicográfico</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <script>alert("Tarea aplicada– DAW");</script>

    <h1>Orden Lexicográfico</h1>

    <div class="tarjeta">

        <h3>Ingrese 8 números enteros</h3>

        <div class="grupo">
            <input type="text" id="n1" placeholder="Número 1">
            <input type="text" id="n2" placeholder="Número 2">
        </div>

        <div class="grupo">
            <input type="text" id="n3" placeholder="Número 3">
            <input type="text" id="n4" placeholder="Número 4">
        </div>

        <div class="grupo">
            <input type="text" id="n5" placeholder="Número 5">
            <input type="text" id="n6" placeholder="Número 6">
        </div>

        <div class="grupo">
            <input type="text" id="n7" placeholder="Número 7">
            <input type="text" id="n8" placeholder="Número 8">
        </div>

        <button onclick="ordenar()">Ordenar</button>

        <hr>

        <div class="resultado" id="resultado">
            El resultado se mostrará aquí
        </div>

    </div>

<script src="js/operacion.js"></script>

</body>
</html>
