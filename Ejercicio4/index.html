<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Conversión de Longitud</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <script>
        alert("Tarea aplicada– DAW");
    </script>
    <h1>Conversión de Longitud</h1>

    <div class="tarjeta">

        <h3>Conversor de unidades</h3>

        <div class="grupo">
            <label>Valor</label>
            <!-- Se añadió oninput para validar en tiempo real mientras el usuario escribe -->
            <input type="number" id="valor" oninput="validarEntrada()">
            <!-- Mensaje de error nuevo: aparece si el valor no pasa la validación con regex -->
            <span class="error" id="errorValor"></span>
        </div>

        <div class="grupo">
            <label>De</label>
            <select id="origen">
                <option value="mm">Milímetros</option>
                <option value="cm">Centímetros</option>
                <option value="m">Metros</option>
                <option value="km">Kilómetros</option>
                <option value="in">Pulgadas</option>
            </select>
        </div>

        <div class="grupo">
            <label>A</label>
            <select id="destino">
                <option value="mm">Milímetros</option>
                <option value="cm">Centímetros</option>
                <option value="m">Metros</option>
                <option value="km">Kilómetros</option>
                <option value="in">Pulgadas</option>
            </select>
        </div>

        <button onclick="convertir()">Convertir</button>

        <!-- Botón nuevo: llama a la función restaurar() para limpiar todo el formulario -->
        <button class="btn-restaurar" onclick="restaurar()">Restaurar</button>

        <div class="resultado" id="resultado">
            Resultado aparecerá aquí
        </div>

    </div>

    <script src="js/script.js"></script>

</body>

</html>
