<!DOCTYPE html>
<html lang="es">

<head>
     <meta charset="UTF-8">
     <title>Jubilación</title>
     <link rel="stylesheet" href="css/style.css">
</head>

<body>

     <script>
          alert("Tarea aplicada– DAW");
     </script>

     <h1>Sistema de Jubilación</h1>

     <div class="tarjeta">

          <h3>Verificar jubilación</h3>

          <div class="grupo">
               <label>Nombre</label>
               <input type="text" id="nombre" placeholder="Ej: María López">
          </div>

          <div class="grupo">
               <label>Edad</label>
               <!-- Se cambió a type="text" para que la validación con regex tenga control total.
     Con type="number" el navegador filtra antes de que el regex pueda actuar. -->
               <input type="text" id="edad" placeholder="Ej: 55">
          </div>

          <div class="grupo">
               <label>Sexo</label>
               <select id="sexo">
                    <option value="">Seleccione</option>
                    <option value="hombre">Hombre</option>
                    <option value="mujer">Mujer</option>
               </select>
          </div>

          <button onclick="verificar()">Verificar</button>

          <div class="resultado" id="resultado">
               Resultado aparecerá aquí
          </div>

     </div>

     <script src="js/script.js"></script>

</body>

</html>
